<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page de Test</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }

        h1 {
            color: #0077ff;
            margin-bottom: 15px;
        }

        p {
            margin-bottom: 20px;
            line-height: 1.5;
        }

        button {
            background: #0077ff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #005ecc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bienvenue 👋</h1>
        <p>Ceci est une page HTML de test avec du CSS incorporé.</p>

        <button onclick="alert('Bouton cliqué !')">
            Cliquer ici
        </button>
    </div>

</body>
</html>
