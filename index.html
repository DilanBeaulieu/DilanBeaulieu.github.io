<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tankies Machine</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Orbitron', sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1d1f47 0%, #090b16 55%, #020204 100%);
      overflow-x: hidden;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .bg-glow {
      position: fixed;
      width: 700px;
      height: 700px;
      background: rgba(0,255,200,0.08);
      filter: blur(120px);
      border-radius: 50%;
      top: -200px;
      left: -150px;
      z-index: 0;
      animation: pulse 6s infinite ease-in-out;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .casino {
      width: 100%;
      max-width: 1100px;
      position: relative;
      z-index: 2;
      border-radius: 30px;
      padding: 25px;
      background: rgba(15, 20, 40, 0.82);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      box-shadow:
        0 0 30px rgba(0,255,200,0.18),
        0 0 80px rgba(0,0,0,0.7);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(90deg, #00ffd5, #ffae00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(0,255,213,0.4);
      letter-spacing: 2px;
    }

    .wallet {
      background: linear-gradient(135deg, #00c9a7, #007f8f);
      padding: 15px 24px;
      border-radius: 18px;
      font-size: 1.2rem;
      font-weight: bold;
      box-shadow: 0 0 20px rgba(0,255,213,0.25);
    }

    .machine {
      background: linear-gradient(180deg, rgba(24,29,57,0.95), rgba(10,13,28,0.98));
      border-radius: 30px;
      padding: 35px;
      border: 2px solid rgba(255,255,255,0.05);
      box-shadow: inset 0 0 25px rgba(255,255,255,0.04);
    }

    .reels {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 30px;
    }

    .reel {
      height: 140px;
      background: linear-gradient(180deg, #13172d, #090b16);
      border-radius: 22px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 4rem;
      border: 2px solid rgba(255,255,255,0.08);
      box-shadow:
        inset 0 0 18px rgba(0,255,213,0.08),
        0 0 18px rgba(0,0,0,0.4);
      transition: 0.2s;
    }

    .reel.spin {
      animation: spin 0.12s linear infinite;
    }

    @keyframes spin {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .bet-box {
      background: rgba(255,255,255,0.05);
      padding: 18px;
      border-radius: 18px;
      min-width: 300px;
      flex: 1;
    }

    .bet-label {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .bet-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bet-controls button {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #00ffd5, #008cff);
      color: white;
      font-size: 1.4rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .bet-controls button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px rgba(0,255,213,0.4);
    }

    .bet-amount {
      flex: 1;
      text-align: center;
      font-size: 1.8rem;
      font-weight: 900;
    }

    .spin-btn {
      padding: 22px 50px;
      border: none;
      border-radius: 22px;
      background: linear-gradient(135deg, #ff9900, #ff2d55);
      color: white;
      font-size: 1.5rem;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 25px rgba(255,80,80,0.35);
    }

    .spin-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 35px rgba(255,80,80,0.55);
    }

    .spin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .message {
      margin-top: 28px;
      text-align: center;
      font-size: 1.2rem;
      min-height: 40px;
      font-weight: bold;
    }

    .bonus-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 99;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .bonus-title {
      font-size: 4rem;
      font-weight: 900;
      margin-bottom: 20px;
      color: #00ffd5;
      text-shadow: 0 0 25px rgba(0,255,213,0.8);
    }

    .bonus-sub {
      font-size: 1.4rem;
      margin-bottom: 35px;
      opacity: 0.8;
    }

    .bonus-btn {
      padding: 20px 40px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #ffe600, #ff7b00);
      font-size: 1.3rem;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s;
    }

    .bonus-btn:hover {
      transform: scale(1.08);
    }

    .stats {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 180px;
      background: rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 18px;
      text-align: center;
    }

    .card h3 {
      opacity: 0.7;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 1.5rem;
      font-weight: 900;
    }

    @media(max-width: 768px) {
      .reels {
        grid-template-columns: repeat(3, 1fr);
      }

      .reel {
        height: 100px;
        font-size: 2.5rem;
      }

      .logo {
        font-size: 1.7rem;
      }

      .spin-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="casino">
  <div class="topbar">
    <div class="logo">🎰 TANKIES MACHINE</div>
    <div class="wallet">💰 Wallet: <span id="wallet">50000.00</span>$</div>
  </div>

  <div class="machine">
    <div class="reels" id="reels">
      <div class="reel">💎</div>
      <div class="reel">🔥</div>
      <div class="reel">🚀</div>
      <div class="reel">💰</div>
      <div class="reel">⭐</div>
    </div>

    <div class="controls">
      <div class="bet-box">
        <div class="bet-label">MISE PAR SPIN</div>
        <div class="bet-controls">
          <button onclick="changeBet(-1)">-</button>
          <div class="bet-amount" id="bet">10.00$</div>
          <button onclick="changeBet(1)">+</button>
        </div>
      </div>

      <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN</button>
    </div>

    <div class="message" id="message">Bonne chance 🍀</div>

    <div class="stats">
      <div class="card">
        <h3>PLUS GROS GAIN</h3>
        <p id="maxWin">0$</p>
      </div>

      <div class="card">
        <h3>SPINS</h3>
        <p id="spins">0</p>
      </div>

      <div class="card">
        <h3>MODE BONUS</h3>
        <p id="bonusCount">0</p>
      </div>
    </div>
  </div>
</div>

<div class="bonus-screen" id="bonusScreen">
  <div class="bonus-title">🔥 BONUS ACTIVÉ 🔥</div>
  <div class="bonus-sub">Tankies Machine vous donne un multiplicateur géant !</div>
  <button class="bonus-btn" onclick="playBonus()">JOUER LE BONUS</button>
</div>

<script>
  const symbols = ['💎', '🔥', '🚀', '💰', '⭐', '🎯', '7️⃣', '👑'];
  const reels = document.querySelectorAll('.reel');

  let wallet = 50000;
  let bet = 10;
  let spins = 0;
  let maxWin = 0;
  let bonusCount = 0;

  const walletEl = document.getElementById('wallet');
  const betEl = document.getElementById('bet');
  const msg = document.getElementById('message');

  function updateUI() {
    walletEl.textContent = wallet.toFixed(2);
    betEl.textContent = bet.toFixed(2) + '$';
    document.getElementById('spins').textContent = spins;
    document.getElementById('maxWin').textContent = maxWin.toFixed(2) + '$';
    document.getElementById('bonusCount').textContent = bonusCount;
  }

  function changeBet(direction) {
    const values = [0.10,0.25,0.50,1,2,5,10,25,50,100,250,500,1000];
    let index = values.indexOf(bet);

    index += direction;

    if(index < 0) index = 0;
    if(index >= values.length) index = values.length - 1;

    bet = values[index];
    updateUI();
  }

  async function spin() {
    if(wallet < bet) {
      msg.innerHTML = '❌ Wallet insuffisant';
      return;
    }

    wallet -= bet;
    spins++;
    updateUI();

    const spinBtn = document.getElementById('spinBtn');
    spinBtn.disabled = true;

    reels.forEach(r => r.classList.add('spin'));

    await new Promise(resolve => setTimeout(resolve, 1800));

    reels.forEach(r => r.classList.remove('spin'));

    let results = [];

    reels.forEach(reel => {
      const symbol = symbols[Math.floor(Math.random() * symbols.length)];
      reel.textContent = symbol;
      results.push(symbol);
    });

    let payout = 0;

    const counts = {};
    results.forEach(s => counts[s] = (counts[s] || 0) + 1);

    const highest = Math.max(...Object.values(counts));

    if(highest === 5) {
      payout = bet * 50;
      msg.innerHTML = '💥 JACKPOT x50 !!!';
    }
    else if(highest === 4) {
      payout = bet * 15;
      msg.innerHTML = '🔥 ÉNORME GAIN x15';
    }
    else if(highest === 3) {
      payout = bet * 5;
      msg.innerHTML = '✨ Nice Win x5';
    }
    else {
      msg.innerHTML = '😢 Aucun gain';
    }

    const bonusChance = Math.random();

    if(bonusChance < 0.08) {
      document.getElementById('bonusScreen').style.display = 'flex';
      bonusCount++;
      updateUI();
    }

    if(payout > 0) {
      wallet += payout;

      if(payout > maxWin) {
        maxWin = payout;
      }

      updateUI();
    }

    spinBtn.disabled = false;
  }

  function playBonus() {
    const multi = [10,20,30,50,100];
    const randomMulti = multi[Math.floor(Math.random() * multi.length)];

    const reward = bet * randomMulti;

    wallet += reward;

    if(reward > maxWin) {
      maxWin = reward;
    }

    document.getElementById('bonusScreen').style.display = 'none';

    msg.innerHTML = `🚀 BONUS WIN : ${reward.toFixed(2)}$ (x${randomMulti})`;

    updateUI();
  }

  updateUI();
</script>

</body>
</html>
