<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tankies Machine Ultimate</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Orbitron',sans-serif;
height:100vh;
overflow:hidden;
background:radial-gradient(circle at top,#13234b,#050816 55%,#02030a);
color:#fff;
}

.container{
width:100%;
height:100vh;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
}

.casino{
width:1700px;
height:920px;
max-width:98%;
background:rgba(5,8,22,0.92);
border:2px solid rgba(255,0,255,0.15);
border-radius:35px;
box-shadow:0 0 60px rgba(0,255,255,0.18);
padding:18px;
position:relative;
overflow:hidden;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
font-size:4rem;
font-weight:900;
background:linear-gradient(90deg,#ffe600,#ff4fd8,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 25px rgba(255,0,255,0.35);
}

.wallet{
padding:18px 35px;
border-radius:22px;
background:linear-gradient(135deg,#00cfff,#00ff9d);
font-size:2rem;
font-weight:900;
color:#03111d;
box-shadow:0 0 25px rgba(0,255,255,0.4);
}

.layout{
display:grid;
grid-template-columns:220px 1fr 390px;
gap:20px;
height:780px;
}

.panel{
background:rgba(255,255,255,0.04);
border-radius:28px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:inset 0 0 20px rgba(255,255,255,0.03);
}

.paytable{
padding:20px;
}

.paytitle{
font-size:2rem;
font-weight:900;
color:#ff68ff;
text-align:center;
margin-bottom:20px;
}

.payitem{
display:flex;
justify-content:space-between;
padding:14px;
margin-bottom:10px;
background:rgba(0,0,0,0.3);
border-radius:16px;
font-size:1.2rem;
}

.center{
display:flex;
flex-direction:column;
gap:18px;
}

.reels{
flex:1;
background:rgba(0,0,0,0.35);
border-radius:32px;
border:2px solid rgba(255,0,255,0.2);
padding:18px;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:14px;
position:relative;
overflow:hidden;
}

.reel{
background:linear-gradient(180deg,#07101f,#02050d);
border-radius:22px;
overflow:hidden;
position:relative;
border:2px solid rgba(0,255,255,0.1);
}

.strip{
position:absolute;
width:100%;
}

.symbol{
height:140px;
display:flex;
justify-content:center;
align-items:center;
font-size:4.3rem;
text-shadow:0 0 20px rgba(255,255,255,0.35);
}

.controls{
display:grid;
grid-template-columns:1fr 220px 220px 220px;
gap:16px;
}

.betbox,.btn{
height:120px;
border-radius:26px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
}

.betbox{
justify-content:space-between;
padding:20px;
}

.betdisplay{
font-size:2.4rem;
font-weight:900;
}

.smallbtn{
width:65px;
height:65px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#00cfff,#00ff9d);
font-size:2rem;
font-weight:bold;
color:white;
cursor:pointer;
}

.btn{
font-size:2.1rem;
font-weight:900;
cursor:pointer;
transition:0.2s;
}

.spin{
background:linear-gradient(135deg,#ff9a00,#ff005d);
box-shadow:0 0 35px rgba(255,0,100,0.45);
}

.auto{
background:linear-gradient(135deg,#0f2d66,#008cff);
}

.max{
background:linear-gradient(135deg,#111827,#202f45);
}

.btn:hover{transform:scale(1.04)}

.side{
padding:20px;
display:flex;
flex-direction:column;
gap:18px;
}

.statgrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.stat{
background:rgba(0,0,0,0.35);
padding:20px;
border-radius:18px;
text-align:center;
}

.stat h3{font-size:0.9rem;opacity:0.7;margin-bottom:10px}
.stat p{font-size:1.7rem;font-weight:900}

.message{
padding:24px;
text-align:center;
font-size:1.4rem;
font-weight:900;
}

.history{
flex:1;
overflow:auto;
background:rgba(0,0,0,0.35);
padding:15px;
border-radius:18px;
}

.history div{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.06)
}

.bonusOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
backdrop-filter:blur(12px);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.bonusBox{
width:950px;
background:#0b1022;
border-radius:35px;
padding:40px;
border:2px solid #8d39ff;
box-shadow:0 0 60px rgba(140,57,255,0.45);
text-align:center;
}

.bonusTitle{
font-size:4rem;
margin-bottom:10px;
color:#b56fff;
}

.pickGrid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:16px;
margin-top:35px;
}

.pick{
height:120px;
border-radius:22px;
background:linear-gradient(135deg,#35125a,#6d2cff);
display:flex;
align-items:center;
justify-content:center;
font-size:3rem;
cursor:pointer;
transition:0.2s;
}

.pick:hover{transform:scale(1.05)}

.info{
margin-top:25px;
font-size:1.5rem;
font-weight:900;
}

.winflash{
animation:flash 0.6s infinite;
}

@keyframes flash{
0%,100%{box-shadow:0 0 25px #00fff2}
50%{box-shadow:0 0 60px #ff00d4}
}
</style>
</head>
<body>
<div class="container">
<div class="casino">
<div class="top">
<div class="logo">🎰 TANKIES MACHINE</div>
<div class="wallet">💰 <span id="wallet">50000.00</span>$</div>
</div>

<div class="layout">
<div class="panel paytable">
<div class="paytitle">JACKPOT</div>
<div class="payitem"><span>💎 MINI</span><span>x10</span></div>
<div class="payitem"><span>🟢 MOYEN</span><span>x25</span></div>
<div class="payitem"><span>🟡 GRAND</span><span>x50</span></div>
<div class="payitem"><span>🟠 GIGA</span><span>x100</span></div>
<div class="payitem"><span>🔴 MAX WIN</span><span>x1000</span></div>
</div>

<div class="center">
<div class="reels" id="reels"></div>

<div class="controls">
<div class="betbox">
<button class="smallbtn" onclick="changeBet(-1)">-</button>
<div class="betdisplay" id="bet">10.00$</div>
<button class="smallbtn" onclick="changeBet(1)">+</button>
</div>

<div class="btn auto" onclick="autoSpin()">AUTO</div>
<div class="btn spin" id="spinBtn" onclick="spin()">SPIN</div>
<div class="btn max" onclick="maxBet()">MAX BET</div>
</div>
</div>

<div class="panel side">
<div class="statgrid">
<div class="stat"><h3>SPINS</h3><p id="spins">0</p></div>
<div class="stat"><h3>MAX WIN</h3><p id="maxWin">0$</p></div>
<div class="stat"><h3>BONUS</h3><p id="bonusCount">0</p></div>
<div class="stat"><h3>TOTAL</h3><p id="totalWon">0$</p></div>
</div>

<div class="panel message" id="message">Bonne chance 🍀</div>

<div class="history" id="history"></div>
</div>
</div>
</div>
</div>

<div class="bonusOverlay" id="bonusOverlay">
<div class="bonusBox">
<div class="bonusTitle">BONUS GAME</div>
<div>Trouve 3 symboles identiques</div>
<div class="pickGrid" id="pickGrid"></div>
<div class="info" id="bonusInfo">Choisis une case...</div>
</div>
</div>

<script>
const symbols=['🚀','💎','🔥','⭐','👑','💰','🌀'];
const bets=[0.10,0.25,0.50,1,2,5,10,25,50,100,250,500,1000];

let wallet=50000;
let bet=10;
let spins=0;
let maxWin=0;
let totalWon=0;
let bonusCount=0;
let auto=false;
let picks=[];

const reels=document.getElementById('reels');

for(let i=0;i<5;i++){
const reel=document.createElement('div');
reel.className='reel';
const strip=document.createElement('div');
strip.className='strip';

for(let j=0;j<30;j++){
const sym=document.createElement('div');
sym.className='symbol';
sym.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];
strip.appendChild(sym);
}

reel.appendChild(strip);
reels.appendChild(reel);
}

function update(){
walletEl.innerText=wallet.toFixed(2);
document.getElementById('bet').innerText=bet.toFixed(2)+'$';
document.getElementById('spins').innerText=spins;
document.getElementById('maxWin').innerText=maxWin.toFixed(2)+'$';
document.getElementById('totalWon').innerText=totalWon.toFixed(2)+'$';
document.getElementById('bonusCount').innerText=bonusCount;
}

const walletEl=document.getElementById('wallet');

function addHistory(txt){
const d=document.createElement('div');
d.innerHTML=txt;
document.getElementById('history').prepend(d);
}

function changeBet(v){
let i=bets.indexOf(bet);
i+=v;
if(i<0)i=0;
if(i>bets.length-1)i=bets.length-1;
bet=bets[i];
update();
}

function maxBet(){
bet=1000;
update();
}

async function spin(){
if(wallet<bet)return;

wallet-=bet;
spins++;
update();

const btn=document.getElementById('spinBtn');
btn.style.pointerEvents='none';

const strips=document.querySelectorAll('.strip');
let results=[];
let bonusTease=false;

strips.forEach((strip,i)=>{
strip.innerHTML='';

for(let j=0;j<45;j++){
const sym=document.createElement('div');
sym.className='symbol';
sym.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];
strip.appendChild(sym);
}

let duration=2.2+(i*0.45);

if(i>=3 && Math.random()<0.35){
bonusTease=true;
duration=1+(i*0.12);
message.innerHTML='⚡ BONUS TEASE ⚡';
}

strip.style.transition='none';
strip.style.transform='translateY(0px)';

setTimeout(()=>{
strip.style.transition='transform '+duration+'s cubic-bezier(.06,.69,.12,1)';
const finalPos=(32+Math.floor(Math.random()*6))*140;
strip.style.transform='translateY(-'+finalPos+'px)';
},50);
});

await new Promise(r=>setTimeout(r,4200));

strips.forEach((strip,i)=>{
let res=symbols[Math.floor(Math.random()*symbols.length)];

if(i<2 && Math.random()<0.28){
res='🌀';
bonusTease=true;
}

if(bonusTease && i===4 && Math.random()<0.55){
res='🌀';
}

results.push(res);

const current=strip.children;
const stopIndex=38;

if(current[stopIndex]){
current[stopIndex].innerHTML=res;
}
});

let payout=0;

const counts={};
results.forEach(r=>counts[r]=(counts[r]||0)+1);
const highest=Math.max(...Object.values(counts));

if(highest===5){
const multi=[100,150,200][Math.floor(Math.random()*3)];
payout=bet*multi;
message.innerHTML='💥 MEGA JACKPOT x'+multi;
reels.classList.add('winflash');
}
else if(highest===4){
const multi=[25,35,50][Math.floor(Math.random()*3)];
payout=bet*multi;
message.innerHTML='🔥 HUGE WIN x'+multi;
}
else if(highest===3){
const multi=[8,10,15][Math.floor(Math.random()*3)];
payout=bet*multi;
message.innerHTML='✨ WIN x'+multi;
}
else{
message.innerHTML='😢 Aucun gain';
}

if(payout>0){
wallet+=payout;
totalWon+=payout;
if(payout>maxWin)maxWin=payout;
addHistory('💰 Gain <b>'+payout.toFixed(2)+'$</b>');
}

const bonusCountSymbols=results.filter(r=>r==='🌀').length;

if(bonusCountSymbols>=3){
setTimeout(()=>openBonus(),1200);
}

update();
btn.style.pointerEvents='auto';

setTimeout(()=>reels.classList.remove('winflash'),2500);

if(auto)setTimeout(spin,1200);
}

function autoSpin(){
auto=!auto;
if(auto)spin();
}

function openBonus(){
document.getElementById('bonusOverlay').style.display='flex';
bonusCount++;
update();

const rewards=[
['MINI',10,'#00ff9d'],['MINI',10,'#00ff9d'],['MINI',10,'#00ff9d'],
['MOYEN',25,'#00cfff'],['MOYEN',25,'#00cfff'],['MOYEN',25,'#00cfff'],
['GRAND',50,'#ffe600'],['GRAND',50,'#ffe600'],['GRAND',50,'#ffe600'],
['GIGA',100,'#ff8c00'],['GIGA',100,'#ff8c00'],['GIGA',100,'#ff8c00'],
['MAX WIN',1000,'#ff005d'],['MAX WIN',1000,'#ff005d'],['MAX WIN',1000,'#ff005d']
];

rewards.sort(()=>Math.random()-0.5);
const grid=document.getElementById('pickGrid');
grid.innerHTML='';
picks=[];

for(let i=0;i<15;i++){
const item=rewards[i];
const card=document.createElement('div');
card.className='pick';
card.innerHTML='❓';

card.onclick=()=>{
if(card.dataset.done)return;
card.dataset.done=1;
card.style.background=item[2];
card.innerHTML='<div><b>'+item[0]+'</b><br>x'+item[1]+'</div>';

picks.push(item[0]);
const same=picks.filter(x=>x===item[0]).length;

document.getElementById('bonusInfo').innerHTML='Tu as '+same+'/3 '+item[0];

if(same>=3){
const reward=bet*item[1];
wallet+=reward;
totalWon+=reward;
if(reward>maxWin)maxWin=reward;
update();

addHistory('🎁 BONUS '+item[0]+' <b>'+reward.toFixed(2)+'$</b>');

message.innerHTML='🏆 BONUS '+item[0]+' '+reward.toFixed(2)+'$';

document.getElementById('bonusInfo').innerHTML='🏆 GAGNÉ '+reward.toFixed(2)+'$';

setTimeout(()=>{
document.getElementById('bonusOverlay').style.display='none';
},2500);
}
};

grid.appendChild(card);
}
}

update();
</script>
</body>
</html>
